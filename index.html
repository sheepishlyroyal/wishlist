<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Wishlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter+Tight:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  @keyframes wl-fade { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  body {
    min-height: 100vh;
    font-family: 'Inter Tight', sans-serif;
    background: radial-gradient(120% 90% at 50% -10%, #2c4f57 0%, #26343d 42%, #221d28 72%, #1b1620 100%);
    color: #f5f1ea;
    position: relative;
    overflow-x: hidden;
  }
  .top-bar { position: fixed; top: 28px; right: 32px; z-index: 40; display: flex; gap: 12px; align-items: center; }
  .admin-badge {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .22em; text-transform: uppercase;
    color: #c99a86; padding: 6px 12px; border: 1px solid rgba(201,154,134,.32); border-radius: 999px;
  }
  .admin-toggle {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .2em; text-transform: uppercase;
    color: #9c9990; background: rgba(245,241,234,.05); border: 1px solid rgba(156,153,144,.28); border-radius: 999px;
    padding: 9px 18px; cursor: pointer; backdrop-filter: blur(6px); transition: all .2s;
  }
  .admin-toggle:hover { color: #f5f1ea; border-color: rgba(156,153,144,.55); background: rgba(245,241,234,.09); }
  header { padding: 88px 40px 44px; text-align: center; }
  h1 {
    font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 56px; line-height: 1.04;
    letter-spacing: -.015em; margin: 0 auto; max-width: 16ch; color: #f5f1ea;
  }
  h1 em { font-style: italic; color: #d97757; }
  main { max-width: 600px; margin: 0 auto; padding: 0 40px 40px; }
  .empty {
    text-align: center; font-family: 'Instrument Serif', serif; font-style: italic; font-size: 26px;
    color: #9c9990; padding: 40px 0;
  }
  ol { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; }
  li.item {
    position: relative; animation: wl-fade .4s ease both; border-top: 1px solid rgba(156,153,144,.14);
    padding: 16px 44px; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 6px;
  }
  .item-name { font-family: 'Instrument Serif', serif; font-size: 22px; line-height: 1.2; letter-spacing: -.01em; color: #f5f1ea; }
  .item-num { color: #9c9990; font-variant-numeric: tabular-nums; }
  .item-note { margin: 0; font-family: 'Instrument Serif', serif; font-style: italic; font-size: 16px; line-height: 1.45; color: #a8a49b; max-width: 46ch; }
  .item-link {
    display: inline-flex; align-items: center; gap: 6px; margin-top: 4px; font-family: 'JetBrains Mono', monospace;
    font-size: 10px; letter-spacing: .18em; text-transform: uppercase; color: #c99a86;
    border-bottom: 1px solid rgba(201,154,134,.35); padding-bottom: 2px; transition: color .2s;
  }
  .item-link:hover { color: #e7c3af; }
  .item-remove {
    position: absolute; top: 12px; right: 0; font-family: 'JetBrains Mono', monospace; font-size: 15px;
    color: #9c9990; background: transparent; border: 1px solid rgba(156,153,144,.28); border-radius: 999px;
    width: 30px; height: 30px; cursor: pointer; line-height: 1; transition: all .2s;
  }
  .item-remove:hover { color: #f5f1ea; border-color: #673c4f; background: rgba(103,60,79,.4); }

  /* Best-case <-> still-good-scenario slider */
  .scenario-slider { width: 100%; max-width: 420px; margin-top: 14px; }
  .scenario-ends {
    display: flex; justify-content: space-between; font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: .16em; text-transform: uppercase; color: #77848a; margin-bottom: 10px;
  }
  .scenario-ends span:last-child { color: #8a95a0; }
  .scenario-track {
    position: relative; height: 4px; border-radius: 999px; background: rgba(156,153,144,.2);
    background-image: linear-gradient(90deg, #d97757, #7fa39c); background-size: 100% 100%;
    opacity: .85; margin: 0 9px;
  }
  .scenario-node {
    position: absolute; top: 50%; width: 16px; height: 16px; border-radius: 50%;
    background: #f5f1ea; border: 2px solid #221d28; transform: translate(-50%, -50%);
    cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,.35); transition: transform .15s; z-index: 2;
  }
  .scenario-node:hover { transform: translate(-50%, -50%) scale(1.15); }
  .scenario-node.draft { cursor: grab; background: #c99a86; }
  .scenario-node.draft:active { cursor: grabbing; }
  .scenario-node.clickable::before {
    content: ''; position: absolute; inset: -2px; border-radius: 50%;
    border: 1.5px solid rgba(201,154,134,.65); animation: wl-pulse 2.2s ease-out infinite; pointer-events: none;
  }
  @keyframes wl-pulse {
    0% { transform: scale(1); opacity: .8; }
    70% { transform: scale(2.2); opacity: 0; }
    100% { transform: scale(2.2); opacity: 0; }
  }

  /* Lightweight popover — anchored to a dot, not a blocking dialog */
  .node-popover {
    position: fixed; z-index: 70; transform: translate(-50%, -100%) translateY(-10px);
    background: #2b232b; border: 1px solid rgba(156,153,144,.24); border-radius: 10px;
    padding: 10px 14px; box-shadow: 0 12px 30px rgba(0,0,0,.4); animation: wl-fade .15s ease both;
    display: flex; align-items: center; gap: 10px; max-width: 240px;
  }
  .node-popover::after {
    content: ''; position: absolute; top: 100%; left: 50%; transform: translateX(-50%);
    border: 6px solid transparent; border-top-color: #2b232b;
  }
  .node-popover-name {
    font-family: 'Instrument Serif', serif; font-size: 16px; color: #f5f1ea; line-height: 1.2;
  }
  .node-popover-link {
    flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 9px; letter-spacing: .12em;
    text-transform: uppercase; color: #c99a86; text-decoration: none; white-space: nowrap;
    border-bottom: 1px solid rgba(201,154,134,.35);
  }
  .node-popover-link:hover { color: #e7c3af; }
  .scenario-hint {
    margin-top: 8px; text-align: center; font-family: 'JetBrains Mono', monospace; font-size: 9px;
    letter-spacing: .14em; text-transform: uppercase; color: #6d787d;
  }
  .scenario-draft-row {
    display: flex; gap: 8px; align-items: center; margin-top: 10px; padding: 8px 10px;
    background: rgba(245,241,234,.03); border: 1px solid rgba(156,153,144,.16); border-radius: 10px;
  }
  .scenario-draft-row input {
    font-family: 'Inter Tight', sans-serif; font-size: 13px; color: #f5f1ea; background: rgba(245,241,234,.05);
    border: 1px solid rgba(156,153,144,.22); border-radius: 8px; padding: 8px 10px; outline: none; flex: 1; min-width: 0;
  }
  .scenario-draft-row input:focus { border-color: rgba(201,154,134,.6); }
  .scenario-draft-remove {
    flex-shrink: 0; font-family: 'JetBrains Mono', monospace; font-size: 13px; color: #9c9990; background: transparent;
    border: 1px solid rgba(156,153,144,.28); border-radius: 999px; width: 26px; height: 26px; cursor: pointer;
  }
  .scenario-draft-remove:hover { color: #f5f1ea; border-color: #673c4f; background: rgba(103,60,79,.4); }
  .scenario-add-node {
    margin-top: 12px; font-family: 'JetBrains Mono', monospace; font-size: 10px; letter-spacing: .16em; text-transform: uppercase;
    color: #9c9990; background: transparent; border: 1px dashed rgba(156,153,144,.34); border-radius: 999px;
    padding: 8px 16px; cursor: pointer; transition: all .2s;
  }
  .scenario-add-node:hover { color: #f5f1ea; border-color: rgba(156,153,144,.6); }

  .add-section { margin-top: 20px; border-top: 1px solid rgba(156,153,144,.16); padding-top: 40px; }
  .add-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .24em; text-transform: uppercase; color: #9c9990; margin-bottom: 22px; }
  .add-form { display: flex; flex-direction: column; gap: 14px; }
  .add-form input {
    font-family: 'Inter Tight', sans-serif; font-size: 16px; color: #f5f1ea; background: rgba(245,241,234,.04);
    border: 1px solid rgba(156,153,144,.24); border-radius: 12px; padding: 14px 20px; outline: none; transition: border-color .2s;
  }
  .add-form input:focus { border-color: rgba(201,154,134,.6); }
  #f-name { font-family: 'Instrument Serif', serif; font-size: 26px; padding: 16px 20px; }
  #f-link { font-family: 'JetBrains Mono', monospace; font-size: 14px; padding: 14px 20px; }
  .add-btn {
    align-self: flex-start; margin-top: 6px; font-family: 'JetBrains Mono', monospace; font-size: 12px;
    letter-spacing: .2em; text-transform: uppercase; color: #221d28; background: #c99a86; border: none;
    border-radius: 999px; padding: 14px 30px; cursor: pointer; transition: background .2s;
  }
  .add-btn:hover { background: #e7c3af; }
  .add-btn:disabled { opacity: .5; cursor: default; }
  footer { text-align: center; padding: 60px 40px 70px; }
  .count-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .24em; text-transform: uppercase; color: rgba(156,153,144,.55); }
  .modal-overlay {
    position: fixed; inset: 0; z-index: 60; background: rgba(20,16,24,.72); backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center; padding: 24px;
  }
  .modal {
    width: 100%; max-width: 420px; background: linear-gradient(165deg,#2b3b42,#241b28);
    border: 1px solid rgba(156,153,144,.22); border-radius: 20px; padding: 40px 36px;
    box-shadow: 0 30px 80px rgba(0,0,0,.5); animation: wl-fade .3s ease both;
  }
  .modal-label { font-family: 'JetBrains Mono', monospace; font-size: 11px; letter-spacing: .24em; text-transform: uppercase; color: #9c9990; margin-bottom: 14px; }
  .modal h2 { font-family: 'Instrument Serif', serif; font-weight: 400; font-size: 34px; margin: 0 0 24px; color: #f5f1ea; }
  .modal input {
    width: 100%; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; font-size: 16px;
    letter-spacing: .1em; color: #f5f1ea; background: rgba(245,241,234,.05); border: 1px solid rgba(156,153,144,.3);
    border-radius: 12px; padding: 15px 18px; outline: none; transition: border-color .2s;
  }
  .modal input:focus { border-color: rgba(201,154,134,.6); }
  .modal-error { margin: 12px 2px 0; font-family: 'JetBrains Mono', monospace; font-size: 12px; color: #d98a7a; }
  .modal-actions { display: flex; gap: 12px; margin-top: 26px; }
  .modal-unlock {
    flex: 1; font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: .2em; text-transform: uppercase;
    color: #221d28; background: #c99a86; border: none; border-radius: 999px; padding: 14px; cursor: pointer; transition: background .2s;
  }
  .modal-unlock:hover { background: #e7c3af; }
  .modal-cancel {
    font-family: 'JetBrains Mono', monospace; font-size: 12px; letter-spacing: .2em; text-transform: uppercase;
    color: #9c9990; background: transparent; border: 1px solid rgba(156,153,144,.28); border-radius: 999px; padding: 14px 22px; cursor: pointer;
  }
  .hidden { display: none !important; }
</style>
</head>
<body>

<div class="top-bar">
  <span id="admin-badge" class="admin-badge hidden">Admin</span>
  <button id="admin-toggle" class="admin-toggle">Admin</button>
</div>

<header>
  <h1>very cool <em>(and expensive!)</em> stuff that i would like to have</h1>
</header>

<main>
  <p id="empty-msg" class="empty hidden">Nothing here yet.</p>
  <ol id="items-list"></ol>

  <div id="add-section" class="add-section hidden">
    <div class="add-label">Add an item</div>
    <div class="add-form">
      <input id="f-name" placeholder="What do you want?">
      <input id="f-note" placeholder="Short note / why (optional)">
      <input id="f-link" placeholder="Link to buy (optional)">

      <div class="scenario-slider">
        <div class="scenario-ends">
          <span>Best case scenario</span>
          <span>Still really good scenario</span>
        </div>
        <div id="draft-track" class="scenario-track"></div>
        <div id="draft-rows"></div>
        <button id="add-node-btn" type="button" class="scenario-add-node">+ Add option</button>
      </div>

      <button id="add-btn" class="add-btn">Add to list</button>
    </div>
  </div>
</main>

<footer>
  <div id="count-label" class="count-label">0 items</div>
</footer>

<div id="modal-overlay" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-label">Admin access</div>
    <h2>Enter password</h2>
    <input id="f-pass" type="password" autofocus placeholder="Password">
    <p id="pass-error" class="modal-error hidden">Incorrect password.</p>
    <div class="modal-actions">
      <button id="submit-pass" class="modal-unlock">Unlock</button>
      <button id="cancel-pass" class="modal-cancel">Cancel</button>
    </div>
  </div>
</div>

<div id="node-popover" class="node-popover hidden">
  <span id="node-popover-name" class="node-popover-name"></span>
  <a id="node-popover-link" class="node-popover-link" href="#" target="_blank" rel="noopener">View ↗</a>
</div>

<script src="config.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
  import {
    getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, serverTimestamp,
  } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore.js";

  const app = initializeApp(window.WISHLIST_FIREBASE_CONFIG);
  const db = getFirestore(app);
  const itemsCol = collection(db, "items");
  const ADMIN_KEY = "wl_admin_pw";
  const ADMIN_PASSWORD = window.WISHLIST_ADMIN_PASSWORD;

  let items = [];
  let isAdmin = false;
  let draftNodes = []; // [{ id, name, link, position }] while composing a new item

  const el = (id) => document.getElementById(id);
  const itemsList = el('items-list');
  const emptyMsg = el('empty-msg');
  const addSection = el('add-section');
  const countLabel = el('count-label');
  const adminBadge = el('admin-badge');
  const adminToggle = el('admin-toggle');
  const modalOverlay = el('modal-overlay');
  const passInput = el('f-pass');
  const passError = el('pass-error');
  const draftTrack = el('draft-track');
  const draftRows = el('draft-rows');
  const nodePopover = el('node-popover');
  const nodePopoverName = el('node-popover-name');
  const nodePopoverLink = el('node-popover-link');

  function getStoredPassword() {
    try { return localStorage.getItem(ADMIN_KEY) || ''; } catch (e) { return ''; }
  }
  function storePassword(pw) {
    try { localStorage.setItem(ADMIN_KEY, pw); } catch (e) {}
  }
  function clearStoredPassword() {
    try { localStorage.removeItem(ADMIN_KEY); } catch (e) {}
  }

  // --- Scenario slider (shared between draft/add-form and read-only item display) ---

  function renderSliderNodes(trackEl, nodes, { draft }) {
    trackEl.querySelectorAll('.scenario-node').forEach(n => n.remove());
    nodes.forEach((node, i) => {
      const marker = document.createElement('div');
      marker.className = 'scenario-node' + (draft ? ' draft' : ' clickable');
      marker.style.left = node.position + '%';
      marker.title = draft ? 'Drag to position' : 'Click for details';
      if (!draft) {
        marker.addEventListener('click', (e) => {
          e.stopPropagation();
          openNodePopover(node, marker);
        });
      }
      if (draft) {
        marker.addEventListener('pointerdown', (e) => {
          e.preventDefault();
          const trackRect = trackEl.getBoundingClientRect();
          function onMove(ev) {
            const x = ev.clientX - trackRect.left;
            const pct = Math.max(0, Math.min(100, (x / trackRect.width) * 100));
            draftNodes[i].position = Math.round(pct);
            marker.style.left = draftNodes[i].position + '%';
          }
          function onUp() {
            window.removeEventListener('pointermove', onMove);
            window.removeEventListener('pointerup', onUp);
          }
          window.addEventListener('pointermove', onMove);
          window.addEventListener('pointerup', onUp);
        });
      }
      trackEl.appendChild(marker);
    });
  }

  function renderDraftNodes() {
    renderSliderNodes(draftTrack, draftNodes, { draft: true });
    draftRows.innerHTML = '';
    draftNodes.forEach((node, i) => {
      const row = document.createElement('div');
      row.className = 'scenario-draft-row';

      const nameInput = document.createElement('input');
      nameInput.placeholder = 'Option name';
      nameInput.value = node.name;
      nameInput.addEventListener('input', (e) => { draftNodes[i].name = e.target.value; });

      const linkInput = document.createElement('input');
      linkInput.placeholder = 'Link (optional)';
      linkInput.value = node.link;
      linkInput.addEventListener('input', (e) => { draftNodes[i].link = e.target.value; });

      const removeBtn = document.createElement('button');
      removeBtn.type = 'button';
      removeBtn.className = 'scenario-draft-remove';
      removeBtn.textContent = '×';
      removeBtn.addEventListener('click', () => {
        draftNodes.splice(i, 1);
        renderDraftNodes();
      });

      row.appendChild(nameInput);
      row.appendChild(linkInput);
      row.appendChild(removeBtn);
      draftRows.appendChild(row);
    });
  }

  function openNodePopover(node, markerEl) {
    nodePopoverName.textContent = node.name || 'Untitled option';
    if (node.link) {
      nodePopoverLink.href = node.link;
      nodePopoverLink.classList.remove('hidden');
    } else {
      nodePopoverLink.classList.add('hidden');
    }
    const rect = markerEl.getBoundingClientRect();
    nodePopover.style.left = (rect.left + rect.width / 2) + 'px';
    nodePopover.style.top = rect.top + 'px';
    nodePopover.classList.remove('hidden');
  }
  function closeNodePopover() {
    nodePopover.classList.add('hidden');
  }
  document.addEventListener('click', (e) => {
    if (!nodePopover.contains(e.target)) closeNodePopover();
  });
  window.addEventListener('scroll', closeNodePopover, true);

  el('add-node-btn').addEventListener('click', () => {
    draftNodes.push({ name: '', link: '', position: draftNodes.length === 0 ? 50 : Math.min(100, draftNodes.length * 25) });
    renderDraftNodes();
  });

  // --- Data sync (Firestore, realtime) ---

  onSnapshot(itemsCol, (snap) => {
    items = snap.docs
      .map(d => ({ id: d.id, ...d.data() }))
      .sort((a, b) => (a.createdAtMs || 0) - (b.createdAtMs || 0));
    render();
  }, (err) => console.error('Wishlist sync error:', err));

  async function removeItem(id) {
    try { await deleteDoc(doc(db, 'items', id)); }
    catch (e) { console.error('Failed to remove item:', e); }
  }

  async function addItem() {
    const name = el('f-name').value.trim();
    if (!name) return;
    const note = el('f-note').value.trim();
    let link = el('f-link').value.trim();
    if (link && !/^https?:\/\//i.test(link)) link = 'https://' + link;

    const nodes = draftNodes
      .filter(n => n.name.trim() || n.link.trim())
      .map(n => {
        let nl = n.link.trim();
        if (nl && !/^https?:\/\//i.test(nl)) nl = 'https://' + nl;
        return { name: n.name.trim(), link: nl, position: n.position };
      });

    try {
      await addDoc(itemsCol, { name, note, link, nodes, createdAtMs: Date.now(), createdAt: serverTimestamp() });
      el('f-name').value = ''; el('f-note').value = ''; el('f-link').value = '';
      draftNodes = [];
      renderDraftNodes();
    } catch (e) {
      console.error('Failed to add item:', e);
    }
  }

  function logout() {
    isAdmin = false;
    clearStoredPassword();
    render();
  }

  function tryAutoLogin() {
    // Purely a local convenience flag — there's no server to verify against,
    // so this is UI-only, matching "this site doesn't need to be secure".
    if (getStoredPassword() === ADMIN_PASSWORD) { isAdmin = true; render(); }
  }

  function openModal() {
    passInput.value = '';
    passError.classList.add('hidden');
    modalOverlay.classList.remove('hidden');
    setTimeout(() => passInput.focus(), 0);
  }
  function closeModal() {
    modalOverlay.classList.add('hidden');
  }

  function submitPassword() {
    const pw = passInput.value;
    if (pw === ADMIN_PASSWORD) {
      isAdmin = true;
      storePassword(pw);
      closeModal();
      render();
    } else {
      passError.classList.remove('hidden');
    }
  }

  function render() {
    itemsList.innerHTML = '';
    emptyMsg.classList.toggle('hidden', items.length !== 0);
    items.forEach((item, i) => {
      const li = document.createElement('li');
      li.className = 'item';

      const nameDiv = document.createElement('div');
      nameDiv.className = 'item-name';
      nameDiv.innerHTML = `<span class="item-num">${i + 1}.</span> `;
      nameDiv.appendChild(document.createTextNode(item.name));
      li.appendChild(nameDiv);

      if (item.note) {
        const noteP = document.createElement('p');
        noteP.className = 'item-note';
        noteP.textContent = item.note;
        li.appendChild(noteP);
      }

      if (item.link) {
        const a = document.createElement('a');
        a.className = 'item-link';
        a.href = item.link;
        a.target = '_blank';
        a.rel = 'noopener';
        a.textContent = 'View item ↗';
        li.appendChild(a);
      }

      if (Array.isArray(item.nodes) && item.nodes.length > 0) {
        const slider = document.createElement('div');
        slider.className = 'scenario-slider';

        const ends = document.createElement('div');
        ends.className = 'scenario-ends';
        ends.innerHTML = '<span>Best case scenario</span><span>Still really good scenario</span>';
        slider.appendChild(ends);

        const track = document.createElement('div');
        track.className = 'scenario-track';
        slider.appendChild(track);
        renderSliderNodes(track, item.nodes, { draft: false });

        const hint = document.createElement('div');
        hint.className = 'scenario-hint';
        hint.textContent = 'tap a dot for details';
        slider.appendChild(hint);

        li.appendChild(slider);
      }

      if (isAdmin) {
        const btn = document.createElement('button');
        btn.className = 'item-remove';
        btn.title = 'Remove';
        btn.textContent = '×';
        btn.addEventListener('click', () => removeItem(item.id));
        li.appendChild(btn);
      }

      itemsList.appendChild(li);
    });

    countLabel.textContent = items.length === 1 ? '1 item' : items.length + ' items';
    adminBadge.classList.toggle('hidden', !isAdmin);
    adminToggle.textContent = isAdmin ? 'Exit admin' : 'Admin';
    addSection.classList.toggle('hidden', !isAdmin);
  }

  adminToggle.addEventListener('click', () => {
    if (isAdmin) logout();
    else openModal();
  });
  el('cancel-pass').addEventListener('click', closeModal);
  el('submit-pass').addEventListener('click', submitPassword);
  passInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitPassword(); });
  modalOverlay.addEventListener('click', (e) => { if (e.target === modalOverlay) closeModal(); });
  el('add-btn').addEventListener('click', addItem);

  tryAutoLogin();
  renderDraftNodes();
</script>
</body>
</html>
